name: Release Pipeline

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build-status: ${{ job.status }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: false

      - name: Verify .NET installation
        run: dotnet --version

      - name: Restore dependencies
        run: dotnet restore BigO.sln --verbosity detailed

      - name: Build
        run: dotnet build BigO.sln --configuration Release --no-restore --verbosity minimal

      - name: Run Unit Tests
        continue-on-error: false
        run: |
          echo "🧪 Running Unit Tests with Code Coverage..."
          dotnet test Testing/UnitTests/UnitTests.csproj \
            --configuration Release \
            --no-build \
            --logger "console;verbosity=detailed" \
            --collect:"XPlat Code Coverage" \
            --results-directory "./TestResults/UnitTests"
        env:
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: false

      - name: Run Integration Tests
        continue-on-error: false
        run: |
          echo "🔗 Running Integration Tests with Code Coverage..."
          dotnet test Testing/IntegrationTests/IntegrationTests.csproj \
            --configuration Release \
            --no-build \
            --logger "console;verbosity=detailed" \
            --collect:"XPlat Code Coverage" \
            --results-directory "./TestResults/IntegrationTests"
        env:
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: false

      - name: List and Organize Coverage Files
        run: |
          echo "📊 ============================================"
          echo "   CODE COVERAGE DATA COLLECTION"
          echo "📊 ============================================"
          echo ""
          echo "🔍 Searching for all coverage files..."
          find ./TestResults -name "*.xml" -type f 2>/dev/null | sort
          echo ""
          echo "📁 Full TestResults directory tree:"
          find ./TestResults -type f 2>/dev/null | head -50
          echo ""
          echo "✅ Coverage file collection complete"

      - name: Extract and Merge Code Coverage
        id: coverage
        continue-on-error: true
        run: |
          echo "📊 ============================================"
          echo "   COVERAGE EXTRACTION & ANALYSIS"
          echo "📊 ============================================"
          echo ""
          
          # Find ALL coverage files
          echo "🔎 Searching for all coverage.cobertura.xml files..."
          COVERAGE_FILES=$(find ./TestResults -name "coverage.cobertura.xml" -type f 2>/dev/null | sort)
          
          if [ -z "$COVERAGE_FILES" ]; then
            echo "⚠️ No coverage files found in TestResults"
            echo "❌ Falling back to search entire repository..."
            COVERAGE_FILES=$(find . -name "coverage.cobertura.xml" -type f 2>/dev/null | sort)
            
            if [ -z "$COVERAGE_FILES" ]; then
              echo "❌ NO COVERAGE FILES FOUND - Build will fail coverage check"
              echo "coverage=0" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          
          echo ""
          echo "📄 Found coverage files:"
          echo "$COVERAGE_FILES" | nl
          echo ""
          
          # Process each coverage file and calculate total average
          TOTAL_COVERAGE=0
          FILE_COUNT=0
          
          while IFS= read -r COVERAGE_FILE; do
            if [ -f "$COVERAGE_FILE" ]; then
              echo "📖 Processing: $COVERAGE_FILE"
              
              # Extract line-rate (0-1 decimal format from Cobertura)
              LINE_RATE=$(grep -oP 'line-rate="\K[0-9.]+' "$COVERAGE_FILE" | head -1)
              BRANCH_RATE=$(grep -oP 'branch-rate="\K[0-9.]+' "$COVERAGE_FILE" | head -1)
              
              if [ -n "$LINE_RATE" ]; then
                # Convert to percentage
                LINE_PERCENT=$(echo "$LINE_RATE * 100" | bc | cut -d'.' -f1)
                BRANCH_PERCENT=$(echo "${BRANCH_RATE:-0} * 100" | bc | cut -d'.' -f1)
                
                echo "   ✓ Line Coverage: $LINE_PERCENT%"
                echo "   ✓ Branch Coverage: $BRANCH_PERCENT%"
                
                TOTAL_COVERAGE=$((TOTAL_COVERAGE + LINE_PERCENT))
                FILE_COUNT=$((FILE_COUNT + 1))
              else
                echo "   ⚠️ Could not parse coverage from file"
              fi
            fi
          done <<< "$COVERAGE_FILES"
          
          echo ""
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "❌ No valid coverage data found in any file"
            echo "coverage=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Calculate average coverage across all test suites
          AVERAGE_COVERAGE=$((TOTAL_COVERAGE / FILE_COUNT))
          
          echo "📊 ============================================"
          echo "   FINAL COVERAGE REPORT"
          echo "📊 ============================================"
          echo "Files analyzed: $FILE_COUNT"
          echo "Average Coverage: $AVERAGE_COVERAGE%"
          echo "Threshold Required: 70%"
          echo ""
          
          if [ "$AVERAGE_COVERAGE" -ge 70 ]; then
            echo "✅ PASS: Coverage meets threshold"
          else
            echo "❌ FAIL: Coverage below threshold (Gap: $((70 - AVERAGE_COVERAGE))%)"
          fi
          echo ""
          
          echo "coverage=$AVERAGE_COVERAGE" >> $GITHUB_OUTPUT

      - name: Check Coverage Threshold
        id: coverage_check
        run: |
          echo "🔐 ============================================"
          echo "   COVERAGE THRESHOLD VALIDATION"
          echo "🔐 ============================================"
          echo ""
          
          COVERAGE="${{ steps.coverage.outputs.coverage }}"
          THRESHOLD=70
          
          echo "📊 Coverage Data:"
          echo "   • Measured Coverage: $COVERAGE%"
          echo "   • Required Threshold: $THRESHOLD%"
          echo ""
          
          if [ -z "$COVERAGE" ]; then
            echo "❌ ERROR: Coverage value not set"
            echo "🚫 DEPLOYMENT BLOCKED - Cannot validate coverage"
            echo "coverage_status=FAILED" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          if [ "$COVERAGE" -lt "$THRESHOLD" ]; then
            COVERAGE_GAP=$((THRESHOLD - COVERAGE))
            echo "❌ FAILED: Code coverage is BELOW threshold"
            echo "📉 Coverage Gap: $COVERAGE_GAP% (need to improve coverage)"
            echo ""
            echo "🚫 DEPLOYMENT BLOCKED — coverage must be ≥ $THRESHOLD%"
            echo "coverage_status=FAILED" >> $GITHUB_OUTPUT
            echo ""
            echo "💡 Recommendations:"
            echo "   1. Add more unit tests for uncovered code paths"
            echo "   2. Add integration tests for critical workflows"
            echo "   3. Aim for at least $((THRESHOLD + 5))% coverage for safety margin"
            exit 1
          else
            COVERAGE_BUFFER=$((COVERAGE - THRESHOLD))
            echo "✅ SUCCESS: Code coverage MEETS threshold"
            echo "📈 Buffer Above Threshold: +$COVERAGE_BUFFER%"
            echo ""
            echo "✅ DEPLOYMENT APPROVED — proceeding with deployment"
            echo "coverage_status=PASSED" >> $GITHUB_OUTPUT
            exit 0
          fi

  deploy:
    needs: build
    if: success() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Application
        continue-on-error: false
        run: |
          echo "🚀 Starting application deployment..."
          echo "Release: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          # Your deployment command here (e.g., Azure App Service deploy)

      - name: Wait for Deployment Stabilization
        run: |
          echo "⏳ Waiting 30 seconds for deployment to stabilize..."
          sleep 30

      - name: Post-Deployment Health Check
        id: health-check
        continue-on-error: true
        run: |
          max_attempts=15
          attempt=1
          health_status="FAILED"
          deployment_url="${{ secrets.DEPLOYMENT_URL }}"
          
          if [ -z "$deployment_url" ]; then
            echo "⚠️ DEPLOYMENT_URL secret not configured. Skipping health check."
            echo "ℹ️ To enable: Settings → Secrets → New secret (DEPLOYMENT_URL)"
            echo "health_status=SKIPPED" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          health_endpoint="$deployment_url/api/health"
          echo "🔍 Starting health checks: $health_endpoint (max $max_attempts attempts)"
          
          while [ $attempt -le $max_attempts ]; do
            echo "[Attempt $attempt/$max_attempts] Polling endpoint..."
            
            response=$(curl -s -w "\n%{http_code}" --connect-timeout 5 "$health_endpoint" 2>&1)
            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | head -n-1)
            
            echo "  Response: HTTP $http_code"
            
            if [ "$http_code" = "200" ]; then
              echo "✅ Health check PASSED"
              health_status="SUCCESS"
              break
            fi
            
            if [ $attempt -eq $max_attempts ]; then
              echo "❌ Health check FAILED after $max_attempts attempts"
              break
            fi
            
            echo "  Waiting 10s before retry..."
            sleep 10
            attempt=$((attempt + 1))
          done
          
          echo "health_status=$health_status" >> $GITHUB_OUTPUT
          
          if [ "$health_status" != "SUCCESS" ] && [ "$health_status" != "SKIPPED" ]; then
            exit 0
          fi

      - name: Deployment Summary
        if: always()
        run: |
          echo "📋 Deployment Summary"
          echo "===================="
          echo "Release: ${{ github.ref_name }}"
          echo "Health Check: ${{ steps.health-check.outputs.health_status }}"
          echo "Job Status: ${{ job.status }}"

  notify-slack-failure:
    needs: build
    if: failure() && needs.build.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack - Build Failed
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 ALEMS Build Pipeline Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ Build Failed - ${{ github.ref_name }}",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Triggered by*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Possible Causes:*\n❌ Dotnet restore failed (dependency issue)\n❌ Build compilation error (code won't compile)\n❌ Unit tests failing\n❌ Integration tests failing\n❌ Coverage below threshold"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  notify-slack-success:
    needs: [build, deploy]
    if: success() && needs.build.result == 'success' && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack - Build Succeeded
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ ALEMS Build Pipeline Succeeded",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ Build Succeeded - ${{ github.ref_name }}",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Release*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Triggered by*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Status:*\n✅ Build completed\n✅ All tests passed\n✅ Deployment successful"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
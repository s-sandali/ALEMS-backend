name: Release Pipeline

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build-status: ${{ job.status }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: false

      - name: Verify .NET installation
        run: dotnet --version

      - name: Restore dependencies
        run: dotnet restore --verbosity detailed

      - name: Build
        run: dotnet build --configuration Release --no-restore --verbosity minimal

      - name: Run Unit Tests
        continue-on-error: false
        run: dotnet test Testing/UnitTests/UnitTests.csproj --configuration Release --no-build --logger "console;verbosity=detailed"

      - name: Run Integration Tests
        continue-on-error: false
        run: dotnet test Testing/IntegrationTests/IntegrationTests.csproj --configuration Release --no-build --logger "console;verbosity=detailed"

      - name: Extract code coverage
        id: coverage
        continue-on-error: true
        run: |
          # Find coverage file
          COVERAGE_FILE=$(find TestResults -name "coverage.cobertura.xml" 2>/dev/null | head -1)
          
          if [ -z "$COVERAGE_FILE" ]; then
            echo "⚠️ No coverage file found. Setting default coverage to 0%"
            echo "coverage=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "📊 Found coverage file: $COVERAGE_FILE"
          COVERAGE=$(grep -oPm1 "(?<=<coverage line-rate=\")[^\"]+" "$COVERAGE_FILE" | head -1)
          
          if [ -z "$COVERAGE" ]; then
            echo "⚠️ Could not parse coverage value. Setting to 0%"
            echo "coverage=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          PERCENT=$(echo "$COVERAGE * 100" | bc | cut -d'.' -f1)
          echo "✅ Coverage is $PERCENT%"
          echo "coverage=$PERCENT" >> $GITHUB_OUTPUT

      - name: Check Coverage Threshold
        run: |
          COVERAGE="${{ steps.coverage.outputs.coverage }}"
          
          if [ -z "$COVERAGE" ]; then
            echo "⚠️ Coverage value not set, skipping threshold check"
            exit 0
          fi
          
          if [ "$COVERAGE" -lt 70 ]; then
            echo "❌ Coverage below 70% — deployment blocked! (Current: $COVERAGE%)"
            exit 1
          else
            echo "✅ Coverage is sufficient at $COVERAGE% — deployment continues"
          fi

  deploy:
    needs: build
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Check Build Status
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Build job failed. Skipping deployment."
            exit 1
          fi

      - name: Checkout code
        run: echo "✅ Code checkout skipped (build already validated)"

      - name: Deploy Application
        continue-on-error: false
        run: |
          echo "🚀 Starting application deployment..."
          echo "Release tag: ${{ github.ref_name }}"
          # Your deployment command here

      - name: Wait for Deployment
        run: |
          echo "⏳ Waiting 30 seconds for deployment to stabilize..."
          sleep 30

      - name: Post-Deployment Health Check
        id: health-check
        run: |
          max_attempts=30
          attempt=1
          health_status="FAILED"
          deployment_url="${{ secrets.DEPLOYMENT_URL }}"
          
          if [ -z "$deployment_url" ]; then
            echo "⚠️ DEPLOYMENT_URL secret not set. Skipping health check."
            echo "health_status=SKIPPED" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          health_endpoint="$deployment_url/api/health"
          echo "🔍 Starting health checks: $health_endpoint"
          
          while [ $attempt -le $max_attempts ]; do
            echo "[Attempt $attempt/$max_attempts] Polling health endpoint..."
            
            response=$(curl -s -w "\n%{http_code}" "$health_endpoint" 2>&1)
            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | head -n-1)
            
            echo "  HTTP: $http_code | Response: $body"
            
            if [ "$http_code" = "200" ]; then
              echo "✅ SUCCESS: Health check passed - Service is healthy"
              health_status="SUCCESS"
              break
            fi
            
            if [ $attempt -eq $max_attempts ]; then
              echo "❌ FAILURE: Max attempts ($max_attempts) reached. Service health check failed."
              break
            fi
            
            echo "  Retrying in 10 seconds..."
            sleep 10
            attempt=$((attempt + 1))
          done
          
          echo "health_status=$health_status" >> $GITHUB_OUTPUT
          
          if [ "$health_status" != "SUCCESS" ] && [ "$health_status" != "SKIPPED" ]; then
            exit 1
          fi

      - name: Deployment Summary
        if: always()
        run: |
          echo "📋 Deployment Summary"
          echo "===================="
          echo "Release: ${{ github.ref_name }}"
          echo "Health Check: ${{ steps.health-check.outputs.health_status }}"
          echo "Job Status: ${{ job.status }}"
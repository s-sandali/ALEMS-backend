name: Release Pipeline

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build-status: ${{ job.status }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: false

      - name: Verify .NET installation
        run: dotnet --version

      - name: Restore dependencies
        run: dotnet restore BigO.sln --verbosity detailed

      - name: Build
        run: dotnet build BigO.sln --configuration Release --no-restore --verbosity minimal

      - name: Run Unit Tests
        continue-on-error: false
        run: |
          dotnet test Testing/UnitTests/UnitTests.csproj \
            --configuration Release \
            --no-build \
            --logger "console;verbosity=detailed" \
            --collect:"XPlat Code Coverage"
        env:
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: false

      - name: Run Integration Tests
        continue-on-error: false
        run: |
          dotnet test Testing/IntegrationTests/IntegrationTests.csproj \
            --configuration Release \
            --no-build \
            --logger "console;verbosity=detailed" \
            --collect:"XPlat Code Coverage"
        env:
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: false

      - name: Extract code coverage
        id: coverage
        continue-on-error: true
        run: |
          # Find all coverage reports from coverlet collector
          COVERAGE_FILES=$(find TestResults -name "coverage.cobertura.xml" 2>/dev/null | head -1)
          
          if [ -z "$COVERAGE_FILES" ]; then
            echo "⚠️ No coverage files found. Setting default coverage to 0%"
            echo "coverage=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "📊 Found coverage file: $COVERAGE_FILES"
          
          # Extract line-rate from cobertura report (range 0-1, convert to 0-100)
          COVERAGE=$(grep -oP 'line-rate="\K[0-9.]+' "$COVERAGE_FILES" | head -1)
          
          if [ -z "$COVERAGE" ]; then
            echo "⚠️ Could not parse coverage value"
            echo "coverage=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Convert decimal to percentage
          PERCENT=$(echo "$COVERAGE * 100" | bc | cut -d'.' -f1)
          echo "✅ Coverage is $PERCENT%"
          echo "coverage=$PERCENT" >> $GITHUB_OUTPUT

      - name: Check Coverage Threshold
        run: |
          COVERAGE="${{ steps.coverage.outputs.coverage }}"
          
          if [ -z "$COVERAGE" ]; then
            echo "⚠️ Coverage value not set, skipping threshold check"
            exit 0
          fi
          
          if [ "$COVERAGE" -lt 70 ]; then
            echo "❌ Coverage below 70% — deployment blocked! (Current: $COVERAGE%)"
            exit 1
          else
            echo "✅ Coverage is sufficient at $COVERAGE% — deployment continues"
          fi

  deploy:
    needs: build
    if: success() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Application
        continue-on-error: false
        run: |
          echo "🚀 Starting application deployment..."
          echo "Release: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          # Your deployment command here (e.g., Azure App Service deploy)

      - name: Wait for Deployment Stabilization
        run: |
          echo "⏳ Waiting 30 seconds for deployment to stabilize..."
          sleep 30

      - name: Post-Deployment Health Check
        id: health-check
        run: |
          max_attempts=15
          attempt=1
          health_status="FAILED"
          deployment_url="${{ secrets.DEPLOYMENT_URL }}"
          
          if [ -z "$deployment_url" ]; then
            echo "⚠️ DEPLOYMENT_URL secret not configured. Skipping health check."
            echo "ℹ️ To enable: Settings → Secrets → New secret (DEPLOYMENT_URL)"
            echo "health_status=SKIPPED" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          health_endpoint="$deployment_url/api/health"
          echo "🔍 Starting health checks: $health_endpoint (max $max_attempts attempts)"
          
          while [ $attempt -le $max_attempts ]; do
            echo "[Attempt $attempt/$max_attempts] Polling endpoint..."
            
            response=$(curl -s -w "\n%{http_code}" --connect-timeout 5 "$health_endpoint" 2>&1)
            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | head -n-1)
            
            echo "  Response: HTTP $http_code"
            
            if [ "$http_code" = "200" ]; then
              echo "✅ Health check PASSED"
              health_status="SUCCESS"
              break
            fi
            
            if [ $attempt -eq $max_attempts ]; then
              echo "❌ Health check FAILED after $max_attempts attempts"
              break
            fi
            
            echo "  Waiting 10s before retry..."
            sleep 10
            attempt=$((attempt + 1))
          done
          
          echo "health_status=$health_status" >> $GITHUB_OUTPUT
          
          if [ "$health_status" != "SUCCESS" ] && [ "$health_status" != "SKIPPED" ]; then
            exit 1
          fi

      - name: Deployment Summary
        if: always()
        run: |
          echo "📋 Deployment Summary"
          echo "===================="
          echo "Release: ${{ github.ref_name }}"
          echo "Health Check: ${{ steps.health-check.outputs.health_status }}"
          echo "Job Status: ${{ job.status }}"

  notify-slack-failure:
    needs: build
    if: failure() && needs.build.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack - Build Failed
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 ALEMS Build Pipeline Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ Build Failed - ${{ github.ref_name }}",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Triggered by*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Possible Causes:*\n❌ Dotnet restore failed (dependency issue)\n❌ Build compilation error (code won't compile)\n❌ Unit tests failing\n❌ Integration tests failing\n❌ Coverage below threshold"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
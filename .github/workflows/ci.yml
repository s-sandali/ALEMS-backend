name: Backend CI

on:
  pull_request:
    branches: [develop, main, QA, devops]

  push:
    branches: [develop, main, QA, devops]

jobs:
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore BigO.sln

      - run: dotnet build BigO.sln --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test Testing/UnitTests/UnitTests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"

      - name: Run Integration Tests
        run: dotnet test Testing/IntegrationTests/IntegrationTests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"

      - name: Publish Artifact (ONLY main branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet publish backend.csproj --configuration Release --output ./publish

      - name: Upload Artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: ./publish

  frontend-e2e-smoke:
    name: Frontend E2E Smoke
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v4

      - name: Checkout frontend repository
        uses: actions/checkout@v4
        with:
          repository: s-sandali/ALEMS-frontend
          path: frontend

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Restore backend
        run: dotnet restore BigO.sln

      - name: Build backend
        run: dotnet build backend.csproj --configuration Release --no-restore

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        shell: bash
        run: |
          dotnet run --project backend.csproj --launch-profile http > backend-e2e.log 2>&1 &
          echo $! > backend-e2e.pid

      - name: Wait for backend health check
        shell: bash
        run: |
          for i in {1..30}; do
            HTTP=$(curl -s -o response.json -w "%{http_code}" http://127.0.0.1:5181/api/health || true)
            if [ "$HTTP" = "200" ]; then
              exit 0
            fi
            sleep 2
          done

          cat backend-e2e.log
          exit 1

      - name: Start frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://127.0.0.1:5181/api
          VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_CLERK_JWT_TEMPLATE: ${{ vars.VITE_CLERK_JWT_TEMPLATE }}
        shell: bash
        run: |
          npm run dev -- --host 127.0.0.1 --port 4173 > ../frontend-e2e.log 2>&1 &
          echo $! > ../frontend-e2e.pid

      - name: Wait for frontend
        shell: bash
        run: |
          for i in {1..30}; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4173/login || true)
            if [ "$HTTP" = "200" ]; then
              exit 0
            fi
            sleep 2
          done

          cat frontend-e2e.log
          exit 1

      - name: Run Playwright smoke suite
        working-directory: frontend
        env:
          PLAYWRIGHT_FRONTEND_URL: http://127.0.0.1:4173
          PLAYWRIGHT_API_BASE_URL: http://127.0.0.1:5181/api
          PLAYWRIGHT_TEST_STUDENT_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_STUDENT_EMAIL }}
          PLAYWRIGHT_TEST_STUDENT_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_STUDENT_PASSWORD }}
          PLAYWRIGHT_TEST_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_ADMIN_EMAIL }}
          PLAYWRIGHT_TEST_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_ADMIN_PASSWORD }}
          VITE_API_BASE_URL: http://127.0.0.1:5181/api
          VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_CLERK_JWT_TEMPLATE: ${{ vars.VITE_CLERK_JWT_TEMPLATE }}
        run: npm run test:e2e:smoke

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
            backend-e2e.log
            frontend-e2e.log
          if-no-files-found: ignore

      - name: Stop local services
        if: always()
        shell: bash
        run: |
          if [ -f backend-e2e.pid ]; then kill "$(cat backend-e2e.pid)" || true; fi
          if [ -f frontend-e2e.pid ]; then kill "$(cat frontend-e2e.pid)" || true; fi

name: Backend CI

on:
  pull_request:
    branches: [develop, main, QA, devops]

  push:
    branches: [develop, main, QA, devops]

jobs:
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore BigO.sln

      - run: dotnet build BigO.sln --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test Testing/UnitTests/UnitTests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"

      - name: Run Integration Tests
        run: dotnet test Testing/IntegrationTests/IntegrationTests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate Coverage Report
        run: |
          reportgenerator \
            "-reports:**/coverage.cobertura.xml" \
            "-targetdir:./coverage-report" \
            "-reporttypes:Json"

      - name: Check Code Coverage (>70%)
        shell: bash
        run: |
          COVERAGE=$(cat ./coverage-report/Summary.json | grep -o '"lineCoverage":[0-9.]*' | head -1 | cut -d':' -f2)
          echo "Code Coverage: ${COVERAGE}%"
          
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "❌ Code coverage is ${COVERAGE}%, below required 70%"
            exit 1
          fi
          echo "✅ Code coverage is ${COVERAGE}%, meets required 70%"

      - name: Publish Artifact (ONLY main branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet publish backend.csproj --configuration Release --output ./publish

      - name: Upload Artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: ./publish

name: Backend CI

on:
  pull_request:
    branches: [develop, main, QA, devops]

  push:
    branches: [develop, main, QA, devops]
    tags:
      - 'v*'

jobs:

  # ─────────────────────────────────────────────
  # SECRET SCAN JOB (Runs on PRs before merge)
  # ─────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # MIGRATION VALIDATION JOB
  # ─────────────────────────────────────────────
  migration-validation:
    name: Migration Validation
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      ConnectionStrings__DefaultConnection: Server=127.0.0.1;Port=3306;Database=alems_test;Uid=root;Pwd=root;SslMode=Disabled;AllowPublicKeyRetrieval=True

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Wait for MySQL and create test database
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              break
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done

          mysql -h 127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS alems_test;"

      - name: Apply SQL migrations in version order
        shell: bash
        run: |
          set -euo pipefail
          for migration in $(find migrations -maxdepth 1 -type f -name 'V*.sql' | sort); do
            echo "Applying ${migration}"
            mysql -h 127.0.0.1 -uroot -proot alems_test < "${migration}"
          done

      - name: Verify critical migration schema
        shell: bash
        run: |
          set -euo pipefail
          ICON_TYPE_COUNT=$(mysql -N -s -h 127.0.0.1 -uroot -proot -D alems_test -e "SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = 'alems_test' AND table_name = 'badges' AND column_name = 'icon_type';")
          ALGORITHM_ID_COUNT=$(mysql -N -s -h 127.0.0.1 -uroot -proot -D alems_test -e "SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = 'alems_test' AND table_name = 'badges' AND column_name = 'algorithm_id';")
          USER_BADGES_TABLE_COUNT=$(mysql -N -s -h 127.0.0.1 -uroot -proot -D alems_test -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'alems_test' AND table_name = 'user_badges';")

          test "${ICON_TYPE_COUNT}" -eq 1
          test "${ALGORITHM_ID_COUNT}" -eq 1
          test "${USER_BADGES_TABLE_COUNT}" -eq 1

  # ─────────────────────────────────────────────
  # BUILD + TEST JOB (Runs after migration gate)
  # ─────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    needs: migration-validation

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      ConnectionStrings__DefaultConnection: Server=127.0.0.1;Port=3306;Database=alems_test;Uid=root;Pwd=root;SslMode=Disabled;AllowPublicKeyRetrieval=True
      COVERAGE_THRESHOLD: '50'
      PERFORMANCE_BASE_URL: http://127.0.0.1:5181
      PERFORMANCE_START_DATE: '2026-04-01'
      PERFORMANCE_END_DATE: '2026-04-30'
      PERFORMANCE_USERS: '20'
      PERFORMANCE_RAMP_UP: '20'
      PERFORMANCE_LOOPS: '10'
      PERFORMANCE_RECORD_COUNT: '1000'
      ENABLE_PERF_SERVICE_TOKEN_AUTH: 'true'
      PERF_SERVICE_TOKEN: ${{ secrets.PERF_SERVICE_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Wait for MySQL and create test database
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              break
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done

          mysql -h 127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS alems_test;"

      - name: Apply SQL migrations in version order
        shell: bash
        run: |
          set -euo pipefail
          for migration in $(find migrations -maxdepth 1 -type f -name 'V*.sql' | sort); do
            echo "Applying ${migration}"
            mysql -h 127.0.0.1 -uroot -proot alems_test < "${migration}"
          done

      - name: Restore dependencies
        run: dotnet restore BigO.sln

      - name: Build
        run: dotnet build BigO.sln --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test Testing/UnitTests/UnitTests.csproj --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory Testing/UnitTests/TestResults

      - name: Run Integration Tests
        run: dotnet test Testing/IntegrationTests/IntegrationTests.csproj --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory Testing/IntegrationTests/TestResults

      - name: Report combined line coverage
        if: (github.event_name == 'pull_request' && github.base_ref == 'main') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        shell: bash
        run: |
          set -euo pipefail
          python3 - << 'PY'
          import glob
          import os
          import sys
          import xml.etree.ElementTree as ET

          threshold = float(os.environ.get("COVERAGE_THRESHOLD", "70"))
          files = glob.glob("Testing/**/TestResults/**/coverage.cobertura.xml", recursive=True)

          if not files:
              print("No coverage.cobertura.xml files found.")
              sys.exit(1)

          covered = 0
          valid = 0
          for path in files:
              root = ET.parse(path).getroot()
              covered += int(root.attrib.get("lines-covered", 0))
              valid += int(root.attrib.get("lines-valid", 0))

          if valid == 0:
              print("Coverage XML files were found, but lines-valid is 0.")
              sys.exit(1)

          coverage = (covered / valid) * 100.0
          print(f"Combined line coverage: {coverage:.2f}% (threshold: {threshold:.2f}%)")

          if coverage < threshold:
              print("::warning::Coverage threshold not met, but the pipeline will continue.")
              sys.exit(0)

          print("Coverage threshold met.")
          PY

      - name: Upload Coverage Report
        if: always() && ((github.event_name == 'pull_request' && github.base_ref == 'main') || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
        uses: actions/upload-artifact@v4
        with:
          name: coverlet-coverage-report
          path: |
            Testing/UnitTests/TestResults/**/coverage.cobertura.xml
            Testing/IntegrationTests/TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn

      - name: Install JMeter
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y default-jdk wget
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$PWD/apache-jmeter-5.6.3/bin" >> "$GITHUB_PATH"

      - name: Start backend API for performance tests
        shell: bash
        run: |
          set -euo pipefail
          dotnet run --project backend.csproj --configuration Release --urls "${PERFORMANCE_BASE_URL}" > /tmp/backend-perf.log 2>&1 &
          echo $! > /tmp/backend-perf.pid

      - name: Wait for backend readiness
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if curl -fsS "${PERFORMANCE_BASE_URL}/health" >/dev/null; then
              echo "Backend is ready for performance tests"
              exit 0
            fi
            echo "Waiting for backend at ${PERFORMANCE_BASE_URL}..."
            sleep 2
          done

          echo "Backend failed to become healthy. Logs:"
          cat /tmp/backend-perf.log || true
          exit 1

      - name: Validate JMeter plan exists
        shell: bash
        run: |
          set -euo pipefail
          ls -la Testing/PerformanceTests
          test -f Testing/PerformanceTests/staging-load-test.jmx || {
            echo "❌ Missing JMeter test plan: Testing/PerformanceTests/staging-load-test.jmx"
            exit 1
          }

      - name: Seed performance dataset (1000 records)
        shell: bash
        run: |
          set -euo pipefail

          DB_HOST="127.0.0.1"
          DB_USER="root"
          DB_PASS="root"
          DB_NAME="alems_test"

          mysql -h "${DB_HOST}" -u"${DB_USER}" -p"${DB_PASS}" "${DB_NAME}" <<SQL
          INSERT INTO Users (ClerkUserId, Email, Role, XpTotal, IsActive, CreatedAt, UpdatedAt)
          VALUES ('perf_admin_clerk', 'perf.admin@example.com', 'Admin', 0, 1, UTC_TIMESTAMP(), UTC_TIMESTAMP())
          ON DUPLICATE KEY UPDATE Role = VALUES(Role), IsActive = VALUES(IsActive), UpdatedAt = UTC_TIMESTAMP();

          DELETE FROM attempt_answers
          WHERE attempt_id IN (
            SELECT attempt_id FROM quiz_attempts WHERE quiz_id IN (
              SELECT quiz_id FROM quizzes WHERE title = 'Performance Load Quiz'
            )
          );

          DELETE FROM quiz_attempts
          WHERE quiz_id IN (SELECT quiz_id FROM quizzes WHERE title = 'Performance Load Quiz');

          DELETE FROM quizzes WHERE title = 'Performance Load Quiz';
          DELETE FROM algorithms WHERE name = 'Performance Algorithm';
          DELETE FROM Users WHERE ClerkUserId LIKE 'perf_clerk_%';
          SQL

          mysql -h "${DB_HOST}" -u"${DB_USER}" -p"${DB_PASS}" "${DB_NAME}" <<'SQL'
          INSERT INTO Users (ClerkUserId, Email, Role, XpTotal, IsActive, CreatedAt, UpdatedAt)
          SELECT
            CONCAT('perf_clerk_', n.n),
            CONCAT('perf.user.', n.n, '@example.com'),
            'User',
            0,
            1,
            UTC_TIMESTAMP(),
            UTC_TIMESTAMP()
          FROM (
            SELECT 1 AS n UNION ALL SELECT 2 UNION ALL SELECT 3 UNION ALL SELECT 4 UNION ALL SELECT 5
            UNION ALL SELECT 6 UNION ALL SELECT 7 UNION ALL SELECT 8 UNION ALL SELECT 9 UNION ALL SELECT 10
            UNION ALL SELECT 11 UNION ALL SELECT 12 UNION ALL SELECT 13 UNION ALL SELECT 14 UNION ALL SELECT 15
            UNION ALL SELECT 16 UNION ALL SELECT 17 UNION ALL SELECT 18 UNION ALL SELECT 19 UNION ALL SELECT 20
            UNION ALL SELECT 21 UNION ALL SELECT 22 UNION ALL SELECT 23 UNION ALL SELECT 24 UNION ALL SELECT 25
          ) AS n;
          SQL

          mysql -h "${DB_HOST}" -u"${DB_USER}" -p"${DB_PASS}" "${DB_NAME}" -e "
            INSERT INTO algorithms (name, category, description, time_complexity_best, time_complexity_average, time_complexity_worst, created_at)
            VALUES ('Performance Algorithm', 'Sorting', 'Perf test algorithm', 'O(n)', 'O(n log n)', 'O(n^2)', UTC_TIMESTAMP());
          "

          ALGORITHM_ID=$(mysql -N -s -h "${DB_HOST}" -u"${DB_USER}" -p"${DB_PASS}" -D "${DB_NAME}" -e "SELECT algorithm_id FROM algorithms WHERE name = 'Performance Algorithm' LIMIT 1;")
          ADMIN_ID=$(mysql -N -s -h "${DB_HOST}" -u"${DB_USER}" -p"${DB_PASS}" -D "${DB_NAME}" -e "SELECT Id FROM Users WHERE ClerkUserId = 'perf_admin_clerk' LIMIT 1;")

          mysql -h "${DB_HOST}" -u"${DB_USER}" -p"${DB_PASS}" "${DB_NAME}" -e "
            INSERT INTO quizzes (algorithm_id, created_by, title, description, time_limit_mins, pass_score, is_active, created_at, updated_at)
            VALUES (${ALGORITHM_ID}, ${ADMIN_ID}, 'Performance Load Quiz', 'NFR-P03 dataset quiz', NULL, 50, 1, UTC_TIMESTAMP(), UTC_TIMESTAMP());
          "

          QUIZ_ID=$(mysql -N -s -h "${DB_HOST}" -u"${DB_USER}" -p"${DB_PASS}" -D "${DB_NAME}" -e "SELECT quiz_id FROM quizzes WHERE title = 'Performance Load Quiz' LIMIT 1;")

          mysql -h "${DB_HOST}" -u"${DB_USER}" -p"${DB_PASS}" "${DB_NAME}" <<SQL
          INSERT INTO quiz_attempts (user_id, quiz_id, score, passed, submitted_at, total_questions, xp_earned, started_at, completed_at)
          SELECT
            u.Id,
            ${QUIZ_ID},
            50 + MOD(nums.n, 51),
            1,
            DATE_ADD('2026-04-01 12:00:00', INTERVAL MOD(nums.n, 28) DAY),
            10,
            10 + MOD(nums.n, 21),
            DATE_ADD('2026-04-01 11:55:00', INTERVAL MOD(nums.n, 28) DAY),
            DATE_ADD('2026-04-01 12:00:00', INTERVAL MOD(nums.n, 28) DAY)
          FROM (
            SELECT (a.d + 10 * b.d + 100 * c.d + 1) AS n
            FROM (SELECT 0 AS d UNION ALL SELECT 1 UNION ALL SELECT 2 UNION ALL SELECT 3 UNION ALL SELECT 4 UNION ALL SELECT 5 UNION ALL SELECT 6 UNION ALL SELECT 7 UNION ALL SELECT 8 UNION ALL SELECT 9) AS a
            CROSS JOIN (SELECT 0 AS d UNION ALL SELECT 1 UNION ALL SELECT 2 UNION ALL SELECT 3 UNION ALL SELECT 4 UNION ALL SELECT 5 UNION ALL SELECT 6 UNION ALL SELECT 7 UNION ALL SELECT 8 UNION ALL SELECT 9) AS b
            CROSS JOIN (SELECT 0 AS d UNION ALL SELECT 1 UNION ALL SELECT 2 UNION ALL SELECT 3 UNION ALL SELECT 4 UNION ALL SELECT 5 UNION ALL SELECT 6 UNION ALL SELECT 7 UNION ALL SELECT 8 UNION ALL SELECT 9) AS c
          ) AS nums
          INNER JOIN Users u ON u.ClerkUserId = CONCAT('perf_clerk_', MOD(nums.n, 25) + 1)
          WHERE nums.n <= ${PERFORMANCE_RECORD_COUNT};
          SQL

          INSERTED_COUNT=$(mysql -N -s -h "${DB_HOST}" -u"${DB_USER}" -p"${DB_PASS}" -D "${DB_NAME}" -e "
            SELECT COUNT(*)
            FROM quiz_attempts qa
            INNER JOIN quizzes q ON q.quiz_id = qa.quiz_id
            WHERE q.title = 'Performance Load Quiz';
          ")

          echo "Inserted quiz attempts for perf dataset: ${INSERTED_COUNT}"
          test "${INSERTED_COUNT}" -ge "${PERFORMANCE_RECORD_COUNT}"

      - name: Run JMeter load test (user endpoints)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p Testing/PerformanceTests/results
          RESULTS_JTL="Testing/PerformanceTests/results/results.jtl"
          JMETER_LOG="Testing/PerformanceTests/results/jmeter.log"
          if [ -z "${PERF_SERVICE_TOKEN:-}" ]; then
            echo "Missing required secret: PERF_SERVICE_TOKEN"
            exit 1
          fi

          jmeter -n \
            -t Testing/PerformanceTests/staging-load-test.jmx \
            -l "${RESULTS_JTL}" \
            -JBASE_URL="${PERFORMANCE_BASE_URL}" \
            -JADMIN_JWT="${PERF_SERVICE_TOKEN}" \
            -JSTART_DATE="${PERFORMANCE_START_DATE}" \
            -JEND_DATE="${PERFORMANCE_END_DATE}" \
            -JUSERS="${PERFORMANCE_USERS}" \
            -JRAMP_UP="${PERFORMANCE_RAMP_UP}" \
            -JLOOPS="${PERFORMANCE_LOOPS}" \
            -j "${JMETER_LOG}"

          if [ ! -f "${RESULTS_JTL}" ]; then
            echo "JMeter completed but no results file was produced at ${RESULTS_JTL}"
            echo "JMeter log:"
            cat "${JMETER_LOG}" || true
            echo "Backend log:"
            cat /tmp/backend-perf.log || true
            exit 1
          fi

      - name: Evaluate NFR-P03 from JMeter results
        shell: bash
        run: |
          set -euo pipefail
          SUMMARY_PATH="Testing/PerformanceTests/results/summary.md"
          RESULTS_JTL="Testing/PerformanceTests/results/results.jtl"

          set +e
          python3 Testing/PerformanceTests/scripts/summarize_jmeter_results.py \
            --input Testing/PerformanceTests/results/results.jtl \
            --output "${SUMMARY_PATH}" \
            --threshold-ms 5000
          STATUS=$?
          set -e

          if [ -f "${SUMMARY_PATH}" ]; then
            echo "Generated NFR summary:"
            cat "${SUMMARY_PATH}"
          else
            echo "Summary file was not generated."
          fi

          if [ "${STATUS}" -ne 0 ]; then
            echo "NFR-P03 evaluation failed. Showing first lines of JTL for diagnostics:"
            head -n 20 "${RESULTS_JTL}" || true
            exit "${STATUS}"
          fi

      - name: Upload JMeter dashboard and NFR summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-report
          path: |
            Testing/PerformanceTests/results/dashboard/**
            Testing/PerformanceTests/results/results.jtl
            Testing/PerformanceTests/results/summary.md
          if-no-files-found: warn

      - name: Stop backend API after performance tests
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -f /tmp/backend-perf.pid ]; then
            kill "$(cat /tmp/backend-perf.pid)" || true
          fi

      # NOTE: E2E tests (Testing/E2ETests) are excluded from CI.
      # They require a visible Chrome browser and manual human interaction
      # (e.g. entering Clerk email verification codes) and cannot run in
      # a headless GitHub Actions environment.

      - name: Publish
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet publish backend.csproj --configuration Release --output ./publish

      - name: Upload Artifact (for deployment)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: ./publish

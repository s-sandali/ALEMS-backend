name: Backend CI

on:
  pull_request:
    branches: [develop, main, QA, devops]

  push:
    branches: [develop, main, QA, devops]
    tags:
      - 'v*'

jobs:
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore BigO.sln

      - run: dotnet build BigO.sln --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test Testing/UnitTests/UnitTests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"

      - name: Run Integration Tests
        run: dotnet test Testing/IntegrationTests/IntegrationTests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate Coverage Report
        run: |
          reportgenerator \
            "-reports:**/coverage.cobertura.xml" \
            "-targetdir:./coverage-report" \
            "-reporttypes:JsonSummary"

      - name: Check Code Coverage (>70%)
        shell: bash
        run: |
          echo "📊 Checking coverage report..."
          if [ -f ./coverage-report/Summary.json ]; then
            echo "Coverage file found. Content preview:"
            head -20 ./coverage-report/Summary.json
            
            # Try to extract coverage using jq first
            COVERAGE=$(cat ./coverage-report/Summary.json | jq -r '.lineCoverage' 2>/dev/null)
            
            # If jq fails or returns null, try alternative extraction
            if [ -z "$COVERAGE" ] || [ "$COVERAGE" = "null" ]; then
              COVERAGE=$(cat ./coverage-report/Summary.json | grep -oP '"lineCoverage":\s*\K[0-9.]+' | head -1)
            fi
            
            # Default to 0 if still empty
            if [ -z "$COVERAGE" ]; then
              COVERAGE=0
            fi
            
            # Remove percentage sign if present
            COVERAGE=${COVERAGE%\%}
            
            echo "Code Coverage: ${COVERAGE}%"
            
            THRESHOLD=65
            if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
              echo "❌ Code coverage is ${COVERAGE}%, below required ${THRESHOLD}%"
              exit 1
            fi
            echo "✅ Code coverage is ${COVERAGE}%, meets required ${THRESHOLD}%"
          else
            echo "❌ Summary.json not found at ./coverage-report/Summary.json"
            ls -la ./coverage-report/ 2>/dev/null || echo "Coverage report directory not found"
            exit 1
          fi

      - name: Publish Artifact (ONLY main branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet publish backend.csproj --configuration Release --output ./publish

      - name: Upload Artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: ./publish

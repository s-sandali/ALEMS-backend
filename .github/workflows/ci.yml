name: Backend CI

on:
  pull_request:
    branches: [develop, main, QA, devops]

  push:
    branches: [develop, main, QA, devops]
    tags:
      - 'v*'

jobs:

  # ─────────────────────────────────────────────
  # SECRET SCAN JOB (Runs on PRs before merge)
  # ─────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # MIGRATION VALIDATION JOB
  # ─────────────────────────────────────────────
  migration-validation:
    name: Migration Validation
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      ConnectionStrings__DefaultConnection: Server=127.0.0.1;Port=3306;Database=alems_test;Uid=root;Pwd=root;SslMode=Disabled;AllowPublicKeyRetrieval=True

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Wait for MySQL and create test database
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              break
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done

          mysql -h 127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS alems_test;"

      - name: Apply SQL migrations in version order
        shell: bash
        run: |
          set -euo pipefail
          for migration in $(find migrations -maxdepth 1 -type f -name 'V*.sql' | sort); do
            echo "Applying ${migration}"
            mysql -h 127.0.0.1 -uroot -proot alems_test < "${migration}"
          done

      - name: Verify critical migration schema
        shell: bash
        run: |
          set -euo pipefail
          ICON_TYPE_COUNT=$(mysql -N -s -h 127.0.0.1 -uroot -proot -D alems_test -e "SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = 'alems_test' AND table_name = 'badges' AND column_name = 'icon_type';")
          ALGORITHM_ID_COUNT=$(mysql -N -s -h 127.0.0.1 -uroot -proot -D alems_test -e "SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = 'alems_test' AND table_name = 'badges' AND column_name = 'algorithm_id';")
          USER_BADGES_TABLE_COUNT=$(mysql -N -s -h 127.0.0.1 -uroot -proot -D alems_test -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'alems_test' AND table_name = 'user_badges';")

          test "${ICON_TYPE_COUNT}" -eq 1
          test "${ALGORITHM_ID_COUNT}" -eq 1
          test "${USER_BADGES_TABLE_COUNT}" -eq 1

  # ─────────────────────────────────────────────
  # BUILD + TEST JOB (Runs after migration gate)
  # ─────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    needs: migration-validation

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      ConnectionStrings__DefaultConnection: Server=127.0.0.1;Port=3306;Database=alems_test;Uid=root;Pwd=root;SslMode=Disabled;AllowPublicKeyRetrieval=True
      COVERAGE_THRESHOLD: '70'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Wait for MySQL and create test database
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              break
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done

          mysql -h 127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS alems_test;"

      - name: Apply SQL migrations in version order
        shell: bash
        run: |
          set -euo pipefail
          for migration in $(find migrations -maxdepth 1 -type f -name 'V*.sql' | sort); do
            echo "Applying ${migration}"
            mysql -h 127.0.0.1 -uroot -proot alems_test < "${migration}"
          done

      - name: Restore dependencies
        run: dotnet restore BigO.sln

      - name: Build
        run: dotnet build BigO.sln --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test Testing/UnitTests/UnitTests.csproj --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory Testing/UnitTests/TestResults

      - name: Run Integration Tests
        run: dotnet test Testing/IntegrationTests/IntegrationTests.csproj --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory Testing/IntegrationTests/TestResults

      - name: Report combined line coverage
        if: (github.event_name == 'pull_request' && github.base_ref == 'main') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        shell: bash
        run: |
          set -euo pipefail
          python3 - << 'PY'
          import glob
          import os
          import sys
          import xml.etree.ElementTree as ET

          threshold = float(os.environ.get("COVERAGE_THRESHOLD", "70"))
          files = glob.glob("Testing/**/TestResults/**/coverage.cobertura.xml", recursive=True)

          if not files:
              print("No coverage.cobertura.xml files found.")
              sys.exit(1)

          covered = 0
          valid = 0
          for path in files:
              root = ET.parse(path).getroot()
              covered += int(root.attrib.get("lines-covered", 0))
              valid += int(root.attrib.get("lines-valid", 0))

          if valid == 0:
              print("Coverage XML files were found, but lines-valid is 0.")
              sys.exit(1)

          coverage = (covered / valid) * 100.0
          print(f"Combined line coverage: {coverage:.2f}% (threshold: {threshold:.2f}%)")

          if coverage < threshold:
              print("::warning::Coverage threshold not met, but the pipeline will continue.")
              sys.exit(0)

          print("Coverage threshold met.")
          PY

      - name: Upload Coverage Report
        if: always() && ((github.event_name == 'pull_request' && github.base_ref == 'main') || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
        uses: actions/upload-artifact@v4
        with:
          name: coverlet-coverage-report
          path: |
            Testing/UnitTests/TestResults/**/coverage.cobertura.xml
            Testing/IntegrationTests/TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn

      # NOTE: E2E tests (Testing/E2ETests) are excluded from CI.
      # They require a visible Chrome browser and manual human interaction
      # (e.g. entering Clerk email verification codes) and cannot run in
      # a headless GitHub Actions environment.

      - name: Publish
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet publish backend.csproj --configuration Release --output ./publish

      - name: Upload Artifact (for deployment)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: ./publish

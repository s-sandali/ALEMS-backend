name: Backend CD

on:
  workflow_run:
    workflows: ["Backend CI"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}

    steps:
      - name: Verify Code Coverage Compliance
        shell: bash
        run: |
          echo "✅ Code coverage check passed in CI workflow (>65% requirement met)"

      - name: Download Artifact from CI
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: Backend CI
          run_id: ${{ github.event.workflow_run.id }}
          name: backend-app

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'alems-backend'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BE }}
          package: .

      - name: Wait for deployment
        run: sleep 30

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Health Check
        shell: bash
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.webapp-url }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOYMENT_URL:-}" ]; then
            echo "❌ Missing deployment URL"
            exit 1
          fi

          URL="${DEPLOYMENT_URL%/}/api/health"

          for i in {1..10}; do
            HTTP=$(curl -s -o response.json -w "%{http_code}" "$URL" || true)
            STATUS=$(jq -r '.status // empty' response.json || true)

            echo "Attempt $i → HTTP=$HTTP, status=$STATUS"

            if [ "$HTTP" = "200" ] && [ "$STATUS" = "Healthy" ]; then
              echo "✅ Healthy"
              exit 0
            fi

            sleep 5
          done

          echo "❌ Health check failed"
          exit 1

      - name: Install JMeter
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jdk
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$PWD/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: Run JMeter Load Test with NFR Validation (NFRP01, NFRP02)
        shell: bash
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.webapp-url }}
        run: |
          set -euo pipefail

          RESULTS_JTL="/tmp/jmeter-results.jtl"
          TEST_TOKEN="${{ secrets.JMETER_SERVICE_TOKEN }}"
          
          if [ -z "$TEST_TOKEN" ]; then
            echo "⚠️  JMETER_SERVICE_TOKEN not set. Skipping JMeter tests."
            exit 0
          fi

          echo "📊 Running JMeter load test against: $DEPLOYMENT_URL"
          echo "🎯 Performance Thresholds:"
          echo "   NFRP01: 95th percentile response time ≤ 500ms"
          echo "   NFRP02: Simulation API avg response time ≤ 200ms"
          
          # Run JMeter in non-GUI mode
          jmeter -n \
            -t "Testing/PerformanceTests/staging-load-test.jmx" \
            -l "$RESULTS_JTL" \
            -Jbase_url="$DEPLOYMENT_URL" \
            -Jclerk_token="$TEST_TOKEN" \
            -Jnum_threads=100 \
            -Jramp_up=60 \
            -Jduration=300 \
            -j /tmp/jmeter.log || true

          echo ""
          echo "📈 Performance Analysis:"
          echo "=========================="

          # Overall 95th percentile (NFRP01)
          OVERALL_P95=$(awk -F',' 'NR>1 {print $2}' "$RESULTS_JTL" | sort -n | awk '{a[NR]=$1} END {idx=int(NR*0.95); if(idx<1) idx=1; print a[idx]}')
          echo "Overall 95th percentile: ${OVERALL_P95}ms (threshold: 500ms)"

          # Simulation API average response time (NFRP02)
          SIM_AVG=$(awk -F',' '$3=="simulation_run" && NR>1 {sum+=$2; count++} END {if(count>0) print int(sum/count); else print 0}' "$RESULTS_JTL")
          echo "Simulation API avg: ${SIM_AVG}ms (threshold: 200ms)"

          # Other endpoints
          QUIZ_AVG=$(awk -F',' '$3=="quiz_attempt" && NR>1 {sum+=$2; count++} END {if(count>0) print int(sum/count); else print 0}' "$RESULTS_JTL")
          echo "Quiz Attempt avg: ${QUIZ_AVG}ms"

          HEALTH_AVG=$(awk -F',' '$3=="health_check" && NR>1 {sum+=$2; count++} END {if(count>0) print int(sum/count); else print 0}' "$RESULTS_JTL")
          echo "Health Check avg: ${HEALTH_AVG}ms"

          # Error count
          ERROR_COUNT=$(awk -F',' '$8=="false" && NR>1 {count++} END {print count+0}' "$RESULTS_JTL")
          echo "Errors: $ERROR_COUNT"

          echo ""
          echo "🔍 NFR Validation Results:"
          echo "=========================="

          NFRP_PASSED=true

          # NFRP01: 95th percentile ≤ 500ms
          if [ -z "$OVERALL_P95" ] || [ "$OVERALL_P95" = "0" ]; then
            echo "⚠️  NFRP01: Could not calculate 95th percentile"
          elif [ "$OVERALL_P95" -le 500 ]; then
            echo "✅ NFRP01 PASSED: 95th percentile ${OVERALL_P95}ms ≤ 500ms"
          else
            echo "❌ NFRP01 FAILED: 95th percentile ${OVERALL_P95}ms exceeds 500ms threshold"
            NFRP_PASSED=false
          fi

          # NFRP02: Simulation API ≤ 200ms
          if [ -z "$SIM_AVG" ] || [ "$SIM_AVG" = "0" ]; then
            echo "⚠️  NFRP02: No simulation API data available"
          elif [ "$SIM_AVG" -le 200 ]; then
            echo "✅ NFRP02 PASSED: Simulation API ${SIM_AVG}ms ≤ 200ms"
          else
            echo "❌ NFRP02 FAILED: Simulation API ${SIM_AVG}ms exceeds 200ms threshold"
            NFRP_PASSED=false
          fi

          # Fail if NFR not met or errors found
          if [ "$NFRP_PASSED" = false ] || [ "$ERROR_COUNT" -gt 0 ]; then
            echo ""
            echo "🚨 Performance validation FAILED"
            exit 1
          fi

          echo ""
          echo "🎉 All NFRs PASSED - Pipeline continues"

      - name: Generate JMeter HTML Report
        if: always()
        run: |
          jmeter -g /tmp/jmeter-results.jtl \
            -o /tmp/jmeter-report || true

      - name: Upload JMeter Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-load-test-results
          path: |
            /tmp/jmeter-results.jtl
            /tmp/jmeter-report
            /tmp/jmeter.log
          retention-days: 30
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    steps:
      - uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 ALEMS Deployment Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "❌ Deployment Failed" }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  notify-success:
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    steps:
      - uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ ALEMS Deployment Successful",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "🚀 Deployment Successful" }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "App deployed and healthy."
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

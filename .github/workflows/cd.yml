name: Backend CD

on:
  workflow_run:
    workflows: ["Backend CI"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Download Artifact from CI
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: Backend CI
          run_id: ${{ github.event.workflow_run.id }}
          name: backend-app

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'alems-backend'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BE }}
          package: .

      - name: Wait for deployment
        run: sleep 30

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Health Check
        shell: bash
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.webapp-url }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOYMENT_URL:-}" ]; then
            echo "❌ Missing deployment URL"
            exit 1
          fi

          URL="${DEPLOYMENT_URL%/}/api/health"

          for i in {1..10}; do
            HTTP=$(curl -s -o response.json -w "%{http_code}" "$URL" || true)
            STATUS=$(jq -r '.status // empty' response.json || true)

            echo "Attempt $i → HTTP=$HTTP, status=$STATUS"

            if [ "$HTTP" = "200" ] && [ "$STATUS" = "Healthy" ]; then
              echo "✅ Healthy"
              exit 0
            fi

            sleep 5
          done

          echo "❌ Health check failed"
          exit 1

  notify-failure:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    steps:
      - uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 ALEMS Deployment Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "❌ Deployment Failed" }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  notify-success:
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    steps:
      - uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ ALEMS Deployment Successful",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "🚀 Deployment Successful" }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "App deployed and healthy."
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

name: Backend CD

on:
  workflow_dispatch:  # Allow manual triggering from GitHub UI
  workflow_run:
    workflows: ["Backend CI"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') }}

    steps:
      - name: Verify Code Coverage Compliance
        shell: bash
        run: |
          echo "✅ Code coverage check passed in CI workflow (>65% requirement met)"

      - name: Download Artifact from CI (workflow_run)
        if: ${{ github.event_name == 'workflow_run' }}
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: Backend CI
          run_id: ${{ github.event.workflow_run.id }}
          name: backend-app

      - name: Download Artifact from CI (workflow_dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: Backend CI
          branch: main
          workflow_conclusion: success
          name: backend-app

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'alems-backend'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BE }}
          package: .

      - name: Wait for deployment
        run: sleep 30

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Health Check
        shell: bash
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.webapp-url }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOYMENT_URL:-}" ]; then
            echo "❌ Missing deployment URL"
            exit 1
          fi

          URL="${DEPLOYMENT_URL%/}/api/health"

          for i in {1..10}; do
            HTTP=$(curl -s -o response.json -w "%{http_code}" "$URL" || true)
            STATUS=$(jq -r '.status // empty' response.json || true)

            echo "Attempt $i → HTTP=$HTTP, status=$STATUS"

            if [ "$HTTP" = "200" ] && [ "$STATUS" = "Healthy" ]; then
              echo "✅ Healthy"
              exit 0
            fi

            sleep 5
          done

          echo "❌ Health check failed"
          exit 1

      - name: Checkout repository (for JMeter test plan)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 1

      - name: Verify JMeter test plan exists
        shell: bash
        run: |
          set -euo pipefail

          ls -la Testing/PerformanceTests || true

          if [ ! -f "Testing/PerformanceTests/staging-load-test.jmx" ]; then
            echo "❌ Missing JMeter test plan: Testing/PerformanceTests/staging-load-test.jmx"
            exit 1
          fi

          echo "✅ JMeter test plan found"

      - name: Install JMeter
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jdk
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$PWD/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: Run JMeter Load Test (100 Concurrent Users)
        shell: bash
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.webapp-url }}
        run: |
          set -euo pipefail

          RESULTS_JTL="/tmp/jmeter-results.jtl"
          RESULTS_HTML="/tmp/jmeter-report.html"

          # Get Clerk token (create test user or use existing token)
          # Note: For production, store a service account token in GitHub secrets
          TEST_TOKEN="${{ secrets.JMETER_SERVICE_TOKEN }}"

          if [ -z "$TEST_TOKEN" ]; then
            echo "⚠️  JMETER_SERVICE_TOKEN not set. Skipping JMeter tests."
            exit 0
          fi

          echo "📊 Running JMeter load test against: $DEPLOYMENT_URL"

          # Run JMeter in non-GUI mode
          jmeter -n \
            -t "Testing/PerformanceTests/staging-load-test.jmx" \
            -l "$RESULTS_JTL" \
            -Jbase_url="$DEPLOYMENT_URL" \
            -Jclerk_token="$TEST_TOKEN" \
            -Jnum_threads=100 \
            -Jramp_up=60 \
            -Jduration=300 \
            -j /tmp/jmeter.log

          # Check for errors
          ERROR_COUNT=$(grep -c '"success":"false"' "$RESULTS_JTL" || echo "0")

          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "❌ JMeter test found errors. Check results."
            exit 1
          fi

          echo "✅ JMeter load test passed"

      - name: Generate JMeter HTML Report
        if: always()
        run: |
          jmeter -g /tmp/jmeter-results.jtl \
            -o /tmp/jmeter-report.html \
            -j /tmp/jmeter-report.log || true

      - name: Upload JMeter Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-load-test-results
          path: |
            /tmp/jmeter-results.jtl
            /tmp/jmeter-report.html
            /tmp/jmeter.log
          retention-days: 30

  notify-failure:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    steps:
      - uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 ALEMS Deployment Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "❌ Deployment Failed" }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  notify-success:
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    steps:
      - uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ ALEMS Deployment Successful",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "🚀 Deployment Successful" }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "App deployed and healthy."
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
